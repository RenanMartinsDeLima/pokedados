<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha PokéDex</title>

    <link rel="stylesheet" href="stylesBox.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">
    <link rel="shortcut icon" type="image/png" sizes="96x96" href="imagens/pokemon-icon.png">
</head>
<body>
    <div class="pc-container">

        <!-- ESQUERDA -->
        <div class="lado-esquerdo">
            <h3>NOME</h3>

            <div class="pokemon-view">
                <img src="">
            </div>

            <p class="level">Lvl. 50</p>

            <div class="tipo">
                <span class="normal">NORMAL</span>
                <span class="flying">FLYING</span>
            </div>

            <p class="habilidade"></p>
        </div>

        <!-- DIREITA -->
        <div class="lado-direito">
            <div class="topo">
                <input></input>
                <button>FILTRAR</button>
            </div>

            <div class="grid" id="grid-pokemon">
                <ul id="lista-capturados"></ul>
            </div>
                
            <div class="botoes">
                <button id="btn-limpar" type="button">APAGAGAR DADOS</button>
                <a href="index.html">
                    <button>VOLTAR</button>
                </a>
            </div>
        </div>

    </div>

    <script src="scripts.js" defer></script>
</body>
</html>
